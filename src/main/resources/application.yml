spring:
  application:
    name: url-shortner-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017}
      database: ${MONGODB_DATABASE:mks-local-db}
      auto-index-creation: false
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

server:
  port: ${SERVER_PORT:8080}
  address: 0.0.0.0
  error:
    include-message: always
    include-binding-error: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,configprops
  endpoint:
    health:
      # Valid values: ALWAYS, NEVER, WHEN_AUTHORIZED
      show-details: WHEN_AUTHORIZED
      probes:
        enabled: true
      indicators:
        mongo:
          enabled: true
        diskSpace:
          enabled: true
    env:
      enabled: true
    info:
      enabled: true
    metrics:
      enabled: true

logging:
  level:
    root: INFO
    com.mks.open: DEBUG
    org.springframework.data.mongodb: INFO
    org.mongodb.driver: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

app:
  short-code:
    length: 6
    max-retries: 3
  redirect:
    default-ttl-seconds: 31536000
  metrics:
    enabled: true
