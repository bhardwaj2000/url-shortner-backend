spring:
  application:
    name: url-shortner-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017}
      database: ${MONGODB_DATABASE:urlshortner_test}
      auto-index-creation: true
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

server:
  port: ${SERVER_PORT:8081}
  error:
    include-message: always
    include-binding-error: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.mks.open: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.mongodb.driver: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

app:
  short-code:
    length: 6
    max-retries: 3
  redirect:
    default-ttl-seconds: 31536000
  metrics:
    enabled: true
