name: Build and Deploy Spring Boot App

on:
  push:
    branches:
      - main
    # Don't trigger this workflow when the push only contains Markdown changes
    paths-ignore:
      - '**/*.md'

jobs:
  detect-changes:
    name: Detect Relevant Changes
    runs-on: ubuntu-latest
    outputs:
      has_relevant_changes: ${{ steps.check.outputs.has_relevant_changes }}
    steps:
      - name: Checkout full repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed files
        id: check
        run: |
          # On push events, GITHUB_EVENT_BEFORE contains previous commit
          BEFORE=${{ github.event.before }}
          AFTER=${{ github.sha }}
          echo "Before: $BEFORE"
          echo "After: $AFTER"

          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            # Fallback: use list of files in the current commit
            CHANGED=$(git show --name-only --pretty="" $AFTER || true)
          else
            CHANGED=$(git diff --name-only $BEFORE $AFTER || true)
          fi

          echo "Changed files:\n$CHANGED"

          # Define relevant patterns: source, build, docker, pom, scripts, workflows
          echo "$CHANGED" | grep -E '^(src/|pom.xml$|Dockerfile$|docker-compose.yml$|^mvnw$|\.github/workflows/|^dockerfile$|^\.github/)' >/dev/null 2>&1
          if [ $? -eq 0 ]; then
            echo "has_relevant_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_relevant_changes=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      - name: Grant Execute Permission
        run: chmod +x mvnw

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: springboot-app
          path: target/*.jar

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: docker build -t url-shortner-backend .

  render-deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    needs:
      - docker
      - detect-changes
    # Only run deploy when relevant project files changed (src, pom.xml, Dockerfile, etc.)
    if: needs.detect-changes.outputs.has_relevant_changes == 'true'

    steps:
      - name: Deploy to Render
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"